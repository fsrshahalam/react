<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a9a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FSR REACT" />
  <!-- Instant meta-refresh fallback -->
  <meta http-equiv="refresh" content="0;url=https://script.google.com/macros/s/AKfycbz5OSjqvgSIe_ZB1ZQZjfKjdYXxF6QrNb1NAvsiavxDWQSGNGadFILB79n169hSZ66Omw/exec" />
  <title>FSR REACT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2057 0%, #1a3a9a 55%, #5b2d8e 100%);
      color: #fff;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .logo {
      width: 80px; height: 80px;
      border-radius: 22px;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900;
      margin-bottom: 20px;
      animation: pop .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    h1 { font-size: 28px; font-weight: 900; letter-spacing: .5px; margin-bottom: 6px; }
    p  { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: .08em; text-transform: uppercase; }
    .loader {
      margin-top: 32px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">R</div>
  <h1>FSR REACT</h1>
  <p>Launching…</p>
  <div class="loader"></div>

  <script>
    // Redirect immediately — no delay needed
    window.location.replace("https://script.google.com/macros/s/AKfycbz5OSjqvgSIe_ZB1ZQZjfKjdYXxF6QrNb1NAvsiavxDWQSGNGadFILB79n169hSZ66Omw/exec");
  </script>
</body>
</html>
