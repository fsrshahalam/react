<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#1a3a9a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FSR REACT"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="FSR REACT"/>
<title>FSR REACT – Research Ethics Application & Compliance Tracking</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }

  /* Full-screen iframe */
  #app-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Loading screen */
  #loading-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #0f2057 0%, #1a3a9a 50%, #5b2d8e 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.4s ease;
  }
  #loading-screen.hide { opacity: 0; pointer-events: none; }
  #loading-screen .logo {
    width: 80px; height: 80px; border-radius: 20px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 900; color: #fff;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  #loading-screen h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  #loading-screen p { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 24px; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Install banner */
  @keyframes pwaSlideUp {
    from { opacity: 0; transform: translateY(100%); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pwaFadeOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(100%); }
  }
  #pwa-install-banner {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 9999; padding: 12px;
    pointer-events: none; display: none;
  }
  #pwa-install-banner.pwa-visible {
    display: block;
    animation: pwaSlideUp 0.4s ease-out forwards;
  }
  #pwa-install-banner.pwa-hiding {
    animation: pwaFadeOut 0.3s ease-in forwards;
  }
  .pwa-card {
    pointer-events: auto;
    background: #fff; border-radius: 16px;
    box-shadow: 0 -2px 20px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.08);
    padding: 16px; max-width: 480px; margin: 0 auto;
    display: flex; align-items: flex-start; gap: 12px;
    border: 1px solid rgba(26,58,154,0.1);
  }
  .pwa-icon {
    width: 44px; height: 44px; min-width: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #1a3a9a, #5b2d8e);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; font-weight: 800;
  }
  .pwa-body { flex: 1; min-width: 0; }
  .pwa-title { font-size: 14px; font-weight: 700; color: #0f2057; line-height: 1.3; margin: 0 0 4px 0; }
  .pwa-desc { font-size: 13px; color: #4b5563; line-height: 1.4; margin: 0 0 8px 0; }
  .pwa-install-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    background: linear-gradient(135deg, #1a3a9a, #2b5fd4);
    color: #fff; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(26,58,154,0.3);
    min-height: 44px;
  }
  .pwa-install-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,58,154,0.4); }
  .pwa-install-btn:active { transform: scale(0.97); }
  .pwa-instruction {
    font-size: 12px; color: #1a3a9a; font-weight: 600;
    background: #f0f4ff; padding: 6px 10px; border-radius: 8px; line-height: 1.4;
  }
  .pwa-dismiss {
    width: 44px; height: 44px; min-width: 44px;
    border: none; background: #f3f4f6; border-radius: 50%;
    font-size: 20px; color: #6b7280; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: background 0.2s;
  }
  .pwa-dismiss:hover { background: #e5e7eb; }

  @media all and (display-mode: standalone) {
    body { padding-bottom: env(safe-area-inset-bottom, 0); }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="logo">R</div>
  <h1>FSR REACT</h1>
  <p>Loading application...</p>
  <div class="spinner"></div>
</div>

<!-- GAS App iframe ================================================ -->
<!-- REPLACE THE URL BELOW WITH YOUR DEPLOYED GAS WEB APP URL       -->
<iframe id="app-frame"
  src=""
  allow="clipboard-write"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation allow-modals">
</iframe>

<!-- Install banner -->
<div id="pwa-install-banner">
  <div class="pwa-card">
    <div class="pwa-icon">R</div>
    <div class="pwa-body">
      <p class="pwa-title">Install FSR REACT</p>
      <p class="pwa-desc">Install this app for faster access and better experience</p>
      <button class="pwa-install-btn" id="pwa-install-btn" style="display:none;">&#10515; Install App</button>
      <div class="pwa-instruction" id="pwa-instruction" style="display:none;"></div>
    </div>
    <button class="pwa-dismiss" id="pwa-dismiss" aria-label="Dismiss install banner">&times;</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz5OSjqvgSIe_ZB1ZQZjfKjdYXxF6QrNb1NAvsiavxDWQSGNGadFILB79n169hSZ66Omw/exec";
const GITHUB_URL = "https://fsrshahalam.github.io/react/";

// Clean URL if returning from login
const params = new URLSearchParams(window.location.search);
if (params.has('loggedin')) {
  window.history.replaceState({}, '', GITHUB_URL);
}

// Set iframe src with noredirect flag — ONE declaration only
const frame = document.getElementById('app-frame');
frame.src = GAS_URL + "?noredirect=1";

// Hide loading screen when iframe loads
frame.addEventListener('load', function() {
  const ls = document.getElementById('loading-screen');
  if (ls) { ls.classList.add('hide'); setTimeout(function() { ls.remove(); }, 500); }
});

// Fallback hide after 10s
setTimeout(function() {
  const ls = document.getElementById('loading-screen');
  if (ls) { ls.classList.add('hide'); setTimeout(function() { ls.remove(); }, 500); }
}, 10000);

// Listen for login trigger from GAS iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'GAS_DO_LOGIN') {
    window.location.href = GAS_URL + "?redirectto=" + encodeURIComponent(GITHUB_URL + "?loggedin=1");
  }
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}

// PWA Install Logic
(function() {
  var isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) return;
  if (localStorage.getItem('pwa_banner_dismissed') === '1') return;

  var ua = navigator.userAgent || '';
  var isIOS = /iP(hone|od|ad)/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);
  var isEdge = /Edg/.test(ua);
  var isChromium = /Chrome/.test(ua) && !isEdge;
  var isFirefox = /Firefox/.test(ua);
  var isSafariDesktop = /Safari/.test(ua) && !isChromium && !isEdge && !isFirefox && !isIOS;

  var banner = document.getElementById('pwa-install-banner');
  var installBtn = document.getElementById('pwa-install-btn');
  var instruction = document.getElementById('pwa-instruction');
  var deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'inline-flex';
    instruction.style.display = 'none';
    if (!banner.classList.contains('pwa-visible')) banner.classList.add('pwa-visible');
  });

  installBtn.addEventListener('click', function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(result) {
      if (result.outcome === 'accepted') dismissBanner(true);
      deferredPrompt = null;
    });
  });

  window.addEventListener('appinstalled', function() { dismissBanner(true); });

  function setManualInstructions() {
    if (isIOS) instruction.innerHTML = 'Tap <strong>Share</strong> &#9757; then <strong>"Add to Home Screen"</strong>';
    else if (isAndroid) instruction.innerHTML = 'Tap <strong>&#8942;</strong> menu then <strong>"Add to Home Screen"</strong>';
    else if (isEdge) instruction.innerHTML = 'Click <strong>&#8942;</strong> menu &rarr; <strong>Apps</strong> &rarr; <strong>"Install this site as an app"</strong>';
    else if (isChromium) instruction.innerHTML = 'Click <strong>&#8942;</strong> menu &rarr; <strong>Cast, save and share</strong> &rarr; <strong>"Install page as app"</strong>';
    else if (isSafariDesktop) instruction.innerHTML = 'Click <strong>File</strong> &rarr; <strong>"Add to Dock"</strong> (macOS Sonoma+)';
    else if (isFirefox) instruction.innerHTML = 'Firefox doesn\'t support install &mdash; use <strong>Chrome</strong> or <strong>Edge</strong> instead';
    else instruction.innerHTML = 'Use your browser\'s <strong>"Create shortcut"</strong> or <strong>"Install"</strong> option from the menu';
  }
  setManualInstructions();

  setTimeout(function() {
    if (!deferredPrompt) instruction.style.display = 'block';
    banner.classList.add('pwa-visible');
  }, 4000);

  function dismissBanner(permanent) {
    banner.classList.remove('pwa-visible');
    banner.classList.add('pwa-hiding');
    if (permanent) localStorage.setItem('pwa_banner_dismissed', '1');
    setTimeout(function() { banner.style.display = 'none'; }, 300);
  }

  document.getElementById('pwa-dismiss').addEventListener('click', function() { dismissBanner(true); });
})();
</script>
</body>
</html>
