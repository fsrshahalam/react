<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a9a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FSR REACT" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="FSR REACT" />
  <title>FSR REACT</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2057 0%, #1a3a9a 55%, #5b2d8e 100%);
      color: #fff;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
    }
    .logo {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }
    .subtitle {
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
    }
    .btn-primary {
      background: #fff;
      color: #1a3a9a;
      box-shadow: 0 10px 24px rgba(255,255,255,0.18);
      margin-bottom: 12px;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.10);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
    }
    .note {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.72);
    }
    .small {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.62);
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">R</div>
    <h1>FSR REACT</h1>
    <p class="subtitle">
      Research Ethics Application & Compliance Tracking System
    </p>

    <a
      class="btn btn-primary"
      href="https://script.google.com/macros/s/AKfycbz5OSjqvgSIe_ZB1ZQZjfKjdYXxF6QrNb1NAvsiavxDWQSGNGadFILB79n169hSZ66Omw/exec">
      Open FSR REACT
    </a>

    <a
      class="btn btn-secondary"
      href="https://script.google.com/macros/s/AKfycbz5OSjqvgSIe_ZB1ZQZjfKjdYXxF6QrNb1NAvsiavxDWQSGNGadFILB79n169hSZ66Omw/exec"
      target="_blank"
      rel="noopener noreferrer">
      Open in New Tab
    </a>

    <p class="note">
      Use your official UiTM Google account to sign in. The app will open directly in its native Google Apps Script environment.
    </p>

    <p class="small">
      Tip: bookmark the GAS page after first login for faster access.
    </p>
  </div>
</body>
</html>
